name = "telegram-ai-bot"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# بعد از ساخت KV namespace با دستور زیر:
#   npx wrangler kv namespace create BOT_KV
# مقدار id برگشتی رو اینجا جایگزین کن
[[kv_namespaces]]
binding = "BOT_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# سکرت‌ها رو با دستورهای زیر ست کن (هرگز اینجا ننویس):
#   npx wrangler secret put ENCRYPTION_KEY
#   npx wrangler secret put SETUP_PASSWORD
#   npx wrangler secret put WEBHOOK_SECRET

# اجازه‌ی import کردن فایل html به‌صورت متن خام تو worker.js
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
